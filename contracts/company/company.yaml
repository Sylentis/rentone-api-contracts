        '401':
          description: Unauthorized - invalid or missing authentication
          content:
            application/json:
              schema:
                $ref: '../shared/schemas/common.yaml#/ErrorResponse'

        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '../shared/schemas/common.yaml#/ErrorResponse'

  # ==================== ONBOARDING ====================
  /onboarding/status:
    get:
      tags:
        - Onboarding
      summary: Get onboarding status
      description: |
        Gets the current onboarding status for the authenticated company.

        **Authentication required**: This endpoint requires a valid JWT bearer token with COMPANY role.

        Returns the completion status of each onboarding step, overall progress percentage,
        and relevant timestamps.
      operationId: getOnboardingStatus
      responses:
        '200':
          description: Onboarding status retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OnboardingStatusResponse'
              example:
                id: "tcrn:onboarding:aabbccdd-1122-3344-5566-778899aabbcc"
                companyId: "tcrn:company:11111111-1111-1111-1111-111111111111"
                status: "IN_PROGRESS"
                completionPercentage: 66
                steps:
                  profileComplete: true
                  documentsVerified: true
                  firstVehicleListed: false
                timestamps:
                  profileCompletedAt: "2024-01-10T10:00:00Z"
                  documentsVerifiedAt: "2024-01-12T14:00:00Z"
                  firstVehicleListedAt: null
                  onboardingStartedAt: "2024-01-10T09:00:00Z"
                  onboardingCompletedAt: null
                fullyOnboarded: false

        '401':
          description: Unauthorized - invalid or missing authentication
          content:
            application/json:
              schema:
                $ref: '../shared/schemas/common.yaml#/ErrorResponse'

        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '../shared/schemas/common.yaml#/ErrorResponse'

  /onboarding/step/{step}:
    post:
      tags:
        - Onboarding
      summary: Complete onboarding step
      description: |
        Completes an onboarding step for the authenticated company.

        **Authentication required**: This endpoint requires a valid JWT bearer token with COMPANY role.

        **Available steps:**
        - `PROFILE_COMPLETE` - Company profile has been fully completed
        - `DOCUMENTS_VERIFIED` - Company documents have been verified
        - `FIRST_VEHICLE_LISTED` - First vehicle has been listed for rental
      operationId: completeOnboardingStep
      parameters:
        - name: step
          in: path
          required: true
          description: The onboarding step to complete
          schema:
            type: string
            enum:
              - PROFILE_COMPLETE
              - DOCUMENTS_VERIFIED
              - FIRST_VEHICLE_LISTED
          example: "PROFILE_COMPLETE"
      responses:
        '200':
          description: Onboarding step completed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompleteStepResponse'
              example:
                onboarding:
                  id: "tcrn:onboarding:aabbccdd-1122-3344-5566-778899aabbcc"
                  companyId: "tcrn:company:11111111-1111-1111-1111-111111111111"
                  status: "IN_PROGRESS"
                  completionPercentage: 33
                  steps:
                    profileComplete: true
                    documentsVerified: false
                    firstVehicleListed: false
                  timestamps:
                    profileCompletedAt: "2024-01-15T10:00:00Z"
                    documentsVerifiedAt: null
                    firstVehicleListedAt: null
                    onboardingStartedAt: "2024-01-10T09:00:00Z"
                    onboardingCompletedAt: null
                  fullyOnboarded: false
                message: "Step completed successfully"

        '400':
          description: Bad request - invalid step or step already completed
          content:
            application/json:
              schema:
                $ref: '../shared/schemas/common.yaml#/ErrorResponse'

        '401':
          description: Unauthorized - invalid or missing authentication
          content:
            application/json:
              schema:
                $ref: '../shared/schemas/common.yaml#/ErrorResponse'

        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '../shared/schemas/common.yaml#/ErrorResponse'

  # ==================== USER PROFILE ====================
  /users/{userId}/profile:
    put:
      tags:
        - User Profile
      summary: Update user profile
      description: |
        Updates the profile of a company user.

        **Authentication required**: This endpoint requires a valid JWT bearer token with COMPANY role.

        Users can only update their own profile (userId must match the authenticated user).
      operationId: updateCompanyUserProfile
      parameters:
        - name: userId
          in: path
          required: true
          description: The user identifier (must match the authenticated user)
          schema:
            type: string
          example: "auth0|507f1f77bcf86cd799439011"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileRequest'
            example:
              name: "Jan Kowalski"
              email: "jan.kowalski@rentacar.pl"
              phone: "+48123456789"
      responses:
        '200':
          description: Profile updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileResponse'
              example:
                message: "Profile updated successfully"
                userId: "auth0|507f1f77bcf86cd799439011"
                name: "Jan Kowalski"
                email: "jan.kowalski@rentacar.pl"

        '400':
          description: Bad request - validation error
          content:
            application/json:
              schema:
                $ref: '../shared/schemas/common.yaml#/ErrorResponse'
              example:
                status: 400
                error: "Bad Request"
                errorCode: "VALIDATION_ERROR"
                message: "Invalid email format"
                timestamp: "2024-01-15T12:00:00Z"

        '401':
          description: Unauthorized - invalid or missing authentication
          content:
            application/json:
              schema:
                $ref: '../shared/schemas/common.yaml#/ErrorResponse'

        '403':
          description: Forbidden - cannot update another user's profile
          content:
            application/json:
              schema:
                $ref: '../shared/schemas/common.yaml#/ErrorResponse'

        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '../shared/schemas/common.yaml#/ErrorResponse'

components:
  # Company-specific response schemas
  schemas:
    CompanyVehiclesResponse:
      type: object
      required:
        - vehicles
        - pagination
      properties:
        vehicles:
          type: array
          items:
            $ref: '../shared/schemas/vehicle.yaml#/VehicleBase'
          description: List of vehicles from the company
        pagination:
          $ref: '../shared/schemas/common.yaml#/PaginationInfo'

    CancelReservationRequest:
      type: object
      properties:
        reason:
          type: string
          maxLength: 500
          description: Optional reason for cancelling the reservation
          example: "Vehicle is no longer available for the requested dates"

    # Dashboard Schemas
    DashboardMetricsResponse:
      type: object
      required:
        - stats
        - recentReservations
      properties:
        stats:
          $ref: '#/components/schemas/DashboardStats'
        recentReservations:
          type: array
          items:
            $ref: '#/components/schemas/DashboardReservation'
          description: Last 5 reservations sorted by creation date
          maxItems: 5

    DashboardStats:
      type: object
      required:
        - totalVehicles
        - availableVehicles
        - activeReservations
        - pendingApproval
        - todayPickups
        - totalRevenue
        - currency
      properties:
        totalVehicles:
          type: integer
          format: int32
          description: Total number of vehicles in fleet
          minimum: 0
          example: 45
        availableVehicles:
          type: integer
          format: int32
          description: Number of available vehicles
          minimum: 0
          example: 38
        activeReservations:
          type: integer
          format: int32
          description: Number of active reservations (confirmed, modification_pending)
          minimum: 0
          example: 12
        pendingApproval:
          type: integer
          format: int32
          description: Number of reservations pending approval (pending, phone_verification_pending)
          minimum: 0
          example: 3
        todayPickups:
          type: integer
          format: int32
          description: Number of pickups scheduled for today
          minimum: 0
          example: 2
        totalRevenue:
          type: integer
          format: int64
          description: Total revenue in smallest currency unit (e.g., groszy for PLN)
          minimum: 0
          example: 125000
        currency:
          type: string
          description: ISO 4217 currency code
          pattern: '^[A-Z]{3}$'
          example: "PLN"

    DashboardReservation:
      type: object
      required:
        - id
        - customer
        - vehicle
        - pickupDate
        - returnDate
        - status
      properties:
        id:
          type: string
          description: Reservation ID (TCRN format)
          pattern: '^tcrn:reservation:[a-f0-9-]+$'
          example: "tcrn:reservation:abc123"
        customer:
          type: string
          description: Customer full name
          example: "Jan Kowalski"
        vehicle:
          type: string
          description: Vehicle make and model
          example: "Toyota RAV4"
        pickupDate:
          type: string
          format: date-time
          description: Pickup date and time (ISO 8601)
          example: "2024-12-20T10:00:00Z"
        returnDate:
          type: string
          format: date-time
          description: Return date and time (ISO 8601)
          example: "2024-12-27T10:00:00Z"
        status:
          $ref: '../shared/schemas/enums.yaml#/ReservationStatus'

    # ==================== Analytics Schemas ====================
    AnalyticsSummaryResponse:
      type: object
      required:
        - revenue
        - vehicles
        - monthly
        - revenueTimeSeries
        - reservationTimeSeries
        - vehicleTypeDistribution
        - availabilityHeatmap
        - calculatedAt
        - currency
      properties:
        revenue:
          $ref: '#/components/schemas/RevenueMetrics'
        vehicles:
          $ref: '#/components/schemas/VehicleMetrics'
        monthly:
          $ref: '#/components/schemas/MonthlyMetrics'
        revenueTimeSeries:
          type: array
          items:
            $ref: '#/components/schemas/RevenueDataPoint'
          description: Time-series data for revenue charts
        reservationTimeSeries:
          type: array
          items:
            $ref: '#/components/schemas/ReservationDataPoint'
          description: Time-series data for reservation count charts
        vehicleTypeDistribution:
          type: array
          items:
            $ref: '#/components/schemas/VehicleTypeDistribution'
          description: Vehicle type distribution for pie charts
        availabilityHeatmap:
          type: array
          items:
            $ref: '#/components/schemas/AvailabilityHeatmapCell'
          description: Availability heatmap data
        calculatedAt:
          type: string
          format: date-time
          description: When the analytics were calculated (ISO 8601)
          example: "2024-01-31T12:00:00Z"
        currency:
          type: string
          description: ISO 4217 currency code
          pattern: '^[A-Z]{3}$'
          example: "PLN"

    RevenueMetrics:
      type: object
      properties:
        totalBrutto:
          type: integer
          format: int64
          description: Total gross revenue in smallest currency unit
          example: 5250000
        dailyTierRevenue:
          type: integer
          format: int64
          description: Revenue from daily-tier rentals in smallest currency unit
          example: 1500000
        weeklyTierRevenue:
          type: integer
          format: int64
          description: Revenue from weekly-tier rentals in smallest currency unit
          example: 2000000
        monthlyTierRevenue:
          type: integer
          format: int64
          description: Revenue from monthly-tier rentals in smallest currency unit
          example: 1750000
        forecastedRevenue:
          type: integer
          format: int64
          description: Forecasted revenue in smallest currency unit
          example: 6000000
        growthPercentage:
          type: number
          format: double
          description: Revenue growth percentage compared to previous period
          example: 12.5

    VehicleMetrics:
      type: object
      properties:
        topVehicles:
          type: array
          items:
            $ref: '#/components/schemas/VehiclePerformance'
          description: Top 10 performing vehicles
          maxItems: 10
        utilizationRate:
          type: number
          format: double
          description: Overall fleet utilization rate as percentage
          example: 72.3
        averageRevenuePerVehicle:
          type: integer
          format: int64
          description: Average revenue per vehicle in smallest currency unit
          example: 116667
        averageDailyRate:
          type: integer
          format: int64
          description: Average daily rental rate in smallest currency unit
          example: 20000
        totalVehicles:
          type: integer
          format: int32
          description: Total number of vehicles in fleet
          example: 45
        vehiclesRented:
          type: integer
          format: int32
          description: Number of vehicles currently rented
          example: 32

    VehiclePerformance:
      type: object
      properties:
        vehicleId:
          type: string
          description: Vehicle identifier
          example: "tcrn:vehicle:aabbccdd-1122-3344-5566-778899aabbcc"
        vehicleName:
          type: string
          description: Vehicle make and model with year
          example: "Toyota RAV4 2023"
        licensePlate:
          type: string
          description: Vehicle license plate number
          example: "WA 12345"
        totalRevenue:
          type: integer
          format: int64
          description: Total revenue from this vehicle in smallest currency unit
          example: 350000
        reservationCount:
          type: integer
          format: int32
          description: Number of reservations for this vehicle
          example: 15
        utilizationRate:
          type: number
          format: double
          description: Vehicle utilization rate as percentage
          example: 85.5
        averageDailyRate:
          type: integer
          format: int64
          description: Average daily rate for this vehicle in smallest currency unit
          example: 25000
        rank:
          type: integer
          format: int32
          description: Performance rank (1 = best performing)
          example: 1

    MonthlyMetrics:
      type: object
      properties:
        momGrowthPercentage:
          type: number
          format: double
          description: Month-over-month growth percentage
          example: 8.5
        seasonalityIndex:
          type: object
          additionalProperties:
            type: number
            format: double
          description: Seasonality index by month (1.0 = average)
          example:
            JANUARY: 0.85
            JULY: 1.45
        conversionRate:
          type: number
          format: double
          description: Booking conversion rate as percentage
          example: 65.0
        cancellationRate:
          type: number
          format: double
          description: Cancellation rate as percentage
          example: 12.0
        noShowRate:
          type: number
          format: double
          description: No-show rate as percentage
          example: 3.0
        totalReservations:
          type: integer
          format: int32
          description: Total number of reservations
          example: 120
        confirmedReservations:
          type: integer
          format: int32
          description: Number of confirmed reservations
          example: 78
        cancelledReservations:
          type: integer
          format: int32
          description: Number of cancelled reservations
          example: 14
        noShowReservations:
          type: integer
          format: int32
          description: Number of no-show reservations
          example: 4

    RevenueDataPoint:
      type: object
      properties:
        date:
          type: string
          format: date
          description: Date of the data point
          example: "2024-01-01"
        revenue:
          type: integer
          format: int64
          description: Revenue for this date in smallest currency unit
          example: 175000
        label:
          type: string
          description: Human-readable label for the data point
          example: "Jan 1"

    ReservationDataPoint:
      type: object
      properties:
        date:
          type: string
          format: date
          description: Date of the data point
          example: "2024-01-01"
        count:
          type: integer
          format: int32
          description: Number of reservations for this date
          example: 5
        label:
          type: string
          description: Human-readable label for the data point
          example: "Jan 1"

    VehicleTypeDistribution:
      type: object
      properties:
        vehicleType:
          type: string
          description: Vehicle type name
          example: "SUV"
        count:
          type: integer
          format: int32
          description: Number of vehicles of this type
          example: 15
        revenue:
          type: integer
          format: int64
          description: Total revenue from this vehicle type in smallest currency unit
          example: 2100000
        percentage:
          type: number
          format: double
          description: Percentage of fleet this type represents
          example: 40.0

    AvailabilityHeatmapCell:
      type: object
      properties:
        dayOfWeek:
          type: string
          enum:
            - MONDAY
            - TUESDAY
            - WEDNESDAY
            - THURSDAY
            - FRIDAY
            - SATURDAY
            - SUNDAY
          description: Day of the week
          example: "MONDAY"
        hour:
          type: integer
          format: int32
          description: Hour of the day (0-23)
          minimum: 0
          maximum: 23
          example: 10
        availableCount:
          type: integer
          format: int32
          description: Number of available vehicles
          example: 30
        rentedCount:
          type: integer
          format: int32
          description: Number of rented vehicles
          example: 15
        utilizationRate:
          type: number
          format: double
          description: Utilization rate as percentage
          example: 33.3

    # ==================== Vehicle Quality Schemas ====================
    SubmitVehicleForReviewResponse:
      type: object
      required:
        - qualityStatus
        - message
      properties:
        qualityStatus:
          $ref: '#/components/schemas/VehicleQualityStatus'
        message:
          type: string
          description: Success message
          example: "Vehicle successfully submitted for quality review"

    VehicleQualityStatus:
      type: object
      required:
        - vehicleId
        - listingStatus
      properties:
        vehicleId:
          type: string
          description: Vehicle identifier
          example: "tcrn:vehicle:3fa85f64-5717-4562-b3fc-2c963f66afa6"
        listingStatus:
          type: string
          description: Current listing status in the review workflow
          enum:
            - DRAFT
            - PENDING_REVIEW
            - APPROVED
            - REJECTED
            - SUSPENDED
          example: "APPROVED"
        statusDescription:
          type: string
          description: Human-readable description of the current status
          example: "Vehicle is approved and visible to customers"
        submittedForReviewAt:
          type: string
          format: date-time
          nullable: true
          description: When the vehicle was submitted for review (ISO 8601)
          example: "2024-01-10T10:00:00Z"
        reviewedAt:
          type: string
          format: date-time
          nullable: true
          description: When the vehicle was last reviewed (ISO 8601)
          example: "2024-01-11T14:30:00Z"
        reviewedBy:
          type: string
          nullable: true
          description: ID of the user who performed the review
          example: "admin-user-123"
        rejectionReason:
          type: string
          nullable: true
          description: Reason for rejection (if listingStatus is REJECTED or SUSPENDED)
          example: null
        photoQualityScore:
          type: integer
          format: int32
          nullable: true
          description: Photo quality score (0-100)
          minimum: 0
          maximum: 100
          example: 90
        listingCompletenessScore:
          type: integer
          format: int32
          nullable: true
          description: Listing completeness score (0-100)
          minimum: 0
          maximum: 100
          example: 95
        overallQualityScore:
          type: integer
          format: int32
          nullable: true
          description: Overall quality score (0-100)
          minimum: 0
          maximum: 100
          example: 92
        customerRating:
          type: number
          format: double
          nullable: true
          description: Customer rating as decimal (1.0 to 5.0)
          example: 4.5
        customerReviewCount:
          type: integer
          format: int32
          nullable: true
          description: Number of customer reviews for this vehicle
          example: 12
        canSubmitForReview:
          type: boolean
          nullable: true
          description: Whether the vehicle can be submitted for review
          example: false

    VehicleValidationResult:
      type: object
      required:
        - vehicleId
        - isValid
        - completenessScore
        - errors
      properties:
        vehicleId:
          type: string
          description: Vehicle identifier
          example: "tcrn:vehicle:3fa85f64-5717-4562-b3fc-2c963f66afa6"
        isValid:
          type: boolean
          description: Whether the vehicle is ready for submission
          example: false
        completenessScore:
          type: integer
          format: int32
          description: Listing completeness score (0-100)
          minimum: 0
          maximum: 100
          example: 75
        errors:
          type: array
          items:
            $ref: '#/components/schemas/ValidationError'
          description: List of validation errors (empty if valid)
        message:
          type: string
          description: Human-readable summary message
          example: "Vehicle has 2 validation errors and cannot be submitted"

    ValidationError:
      type: object
      required:
        - field
        - message
      properties:
        field:
          type: string
          description: The field that failed validation
          example: "photos"
        message:
          type: string
          description: The error message
          example: "At least 3 photos are required"

    CompanyQualityMetrics:
      type: object
      required:
        - companyId
        - qualityScore
        - tier
      properties:
        companyId:
          type: string
          description: Company identifier
          example: "tcrn:company:11111111-1111-1111-1111-111111111111"
        qualityScore:
          type: integer
          format: int32
          description: Calculated quality score (0-100)
          minimum: 0
          maximum: 100
          example: 78
        tier:
          type: string
          description: Quality tier classification
          enum:
            - BRONZE
            - SILVER
            - GOLD
            - PLATINUM
          example: "GOLD"
        tierDescription:
          type: string
          description: Human-readable description of the tier
          example: "Premium tier (score 70-84)"
        pointsToNextTier:
          type: integer
          format: int32
          description: Points needed to reach the next tier
          example: 7
        avgResponseTimeHours:
          type: number
          format: double
          description: Average response time to booking requests in hours
          example: 2.5
        acceptanceRate:
          type: number
          format: double
          description: Booking acceptance rate (0.0 to 1.0)
          example: 0.92
        avgCustomerRating:
          type: number
          format: double
          description: Average customer rating (1.0 to 5.0)
          example: 4.3
        totalReviews:
          type: integer
          format: int32
          description: Total number of customer reviews
          example: 87
        totalBookings:
          type: integer
          format: int32
          description: Total number of bookings
          example: 245
        completedBookings:
          type: integer
          format: int32
          description: Number of successfully completed bookings
          example: 230
        completionRate:
          type: number
          format: double
          description: Completion rate as percentage
          example: 93.9
        cancelledByPartner:
          type: integer
          format: int32
          description: Number of bookings cancelled by the partner
          example: 5
        totalDisputes:
          type: integer
          format: int32
          description: Total number of disputes
          example: 3
        disputesLostByPartner:
          type: integer
          format: int32
          description: Number of disputes lost by the partner
          example: 1
        lastCalculatedAt:
          type: string
          format: date-time
          description: When the metrics were last calculated (ISO 8601)
          example: "2024-01-15T10:00:00Z"

    # ==================== Support Ticket Schemas ====================
    CreateSupportTicketRequest:
      type: object
      required:
        - subject
        - description
        - category
      properties:
        subject:
          type: string
          maxLength: 255
          description: Ticket subject
          example: "Unable to upload vehicle photos"
        description:
          type: string
          description: Detailed description of the issue
          example: "When trying to upload photos for my Toyota RAV4, I get an error message."
        category:
          type: string
          description: Ticket category
          enum:
            - account
            - billing
            - reservation
            - vehicle
            - technical
            - other
          example: "technical"
        priority:
          type: string
          nullable: true
          description: Ticket priority (defaults to MEDIUM if not specified)
          enum:
            - low
            - medium
            - high
            - critical
          example: "medium"

    SupportTicket:
      type: object
      required:
        - id
        - companyId
        - subject
        - category
        - status
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          description: Unique ticket identifier
          example: "tcrn:ticket:aabbccdd-1122-3344-5566-778899aabbcc"
        companyId:
          type: string
          description: Company that created the ticket
          example: "tcrn:company:11111111-1111-1111-1111-111111111111"
        createdById:
          type: string
          nullable: true
          description: User who created the ticket
          example: "user-123"
        subject:
          type: string
          description: Ticket subject
          example: "Unable to upload vehicle photos"
        description:
          type: string
          description: Detailed description of the issue
          example: "When trying to upload photos..."
        category:
          type: string
          description: Ticket category
          enum:
            - account
            - billing
            - reservation
            - vehicle
            - technical
            - other
          example: "technical"
        priority:
          type: string
          description: Ticket priority
          enum:
            - low
            - medium
            - high
            - critical
          example: "medium"
        status:
          type: string
          description: Current ticket status
          enum:
            - open
            - in_progress
            - waiting_customer
            - resolved
            - closed
          example: "open"
        assignedTo:
          type: string
          nullable: true
          description: Support agent assigned to the ticket
          example: null
        firstResponseAt:
          type: string
          format: date-time
          nullable: true
          description: When the first response was sent (ISO 8601)
          example: null
        resolvedAt:
          type: string
          format: date-time
          nullable: true
          description: When the ticket was resolved (ISO 8601)
          example: null
        slaResponseDue:
          type: string
          format: date-time
          nullable: true
          description: SLA deadline for first response (ISO 8601)
          example: "2024-01-15T20:00:00Z"
        slaResolutionDue:
          type: string
          format: date-time
          nullable: true
          description: SLA deadline for resolution (ISO 8601)
          example: "2024-01-17T12:00:00Z"
        slaResponseBreached:
          type: boolean
          nullable: true
          description: Whether the SLA response deadline was breached
          example: false
        slaResolutionBreached:
          type: boolean
          nullable: true
          description: Whether the SLA resolution deadline was breached
          example: false
        createdAt:
          type: string
          format: date-time
          description: When the ticket was created (ISO 8601)
          example: "2024-01-15T12:00:00Z"
        updatedAt:
          type: string
          format: date-time
          description: When the ticket was last updated (ISO 8601)
          example: "2024-01-15T12:00:00Z"
        messageCount:
          type: integer
          format: int64
          nullable: true
          description: Total number of messages in the ticket
          example: 2

    SupportTicketListResponse:
      type: object
      required:
        - tickets
        - page
        - size
        - totalElements
        - totalPages
      properties:
        tickets:
          type: array
          items:
            $ref: '#/components/schemas/SupportTicket'
          description: List of support tickets
        page:
          type: integer
          format: int32
          description: Current page number (0-indexed)
          minimum: 0
          example: 0
        size:
          type: integer
          format: int32
          description: Number of items per page
          example: 20
        totalElements:
          type: integer
          format: int64
          description: Total number of tickets across all pages
          example: 15
        totalPages:
          type: integer
          format: int32
          description: Total number of pages
          example: 1

    SupportTicketDetailResponse:
      type: object
      required:
        - ticket
        - messages
      properties:
        ticket:
          $ref: '#/components/schemas/SupportTicket'
        messages:
          type: array
          items:
            $ref: '#/components/schemas/TicketMessage'
          description: List of messages in the ticket

    AddTicketMessageRequest:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          description: The message content
          example: "I've tried with smaller files and still getting the same error."
        isInternal:
          type: boolean
          nullable: true
          description: Whether this is an internal-only message (not visible to customer)
          default: false
          example: false

    TicketMessage:
      type: object
      required:
        - id
        - ticketId
        - message
        - createdAt
      properties:
        id:
          type: string
          description: Unique message identifier
          example: "tcrn:message:11223344-5566-7788-99aa-bbccddeeff00"
        ticketId:
          type: string
          description: The ticket this message belongs to
          example: "tcrn:ticket:aabbccdd-1122-3344-5566-778899aabbcc"
        authorType:
          type: string
          nullable: true
          description: Type of the message author
          example: "SUPPORT"
        authorId:
          type: string
          nullable: true
          description: Identifier of the message author
          example: "support-agent-456"
        authorName:
          type: string
          nullable: true
          description: Display name of the message author
          example: "Support Team"
        message:
          type: string
          description: The message content
          example: "Thank you for reaching out. We are investigating the issue."
        isInternal:
          type: boolean
          nullable: true
          description: Whether this is an internal-only message
          example: false
        createdAt:
          type: string
          format: date-time
          description: When the message was created (ISO 8601)
          example: "2024-01-15T14:00:00Z"

    TicketStatusCounts:
      type: object
      required:
        - open
        - inProgress
        - waitingCustomer
        - resolved
        - closed
        - total
        - active
      properties:
        open:
          type: integer
          format: int64
          description: Number of open tickets
          minimum: 0
          example: 3
        inProgress:
          type: integer
          format: int64
          description: Number of in-progress tickets
          minimum: 0
          example: 2
        waitingCustomer:
          type: integer
          format: int64
          description: Number of tickets waiting for customer response
          minimum: 0
          example: 1
        resolved:
          type: integer
          format: int64
          description: Number of resolved tickets
          minimum: 0
          example: 5
        closed:
          type: integer
          format: int64
          description: Number of closed tickets
          minimum: 0
          example: 12
        total:
          type: integer
          format: int64
          description: Total number of tickets
          minimum: 0
          example: 23
        active:
          type: integer
          format: int64
          description: Number of active tickets (open + in_progress + waiting_customer)
          minimum: 0
          example: 6

    # ==================== Onboarding Schemas ====================
    OnboardingStatusResponse:
      type: object
      required:
        - status
        - completionPercentage
        - steps
        - fullyOnboarded
      properties:
        id:
          type: string
          nullable: true
          description: Onboarding record identifier
          example: "tcrn:onboarding:aabbccdd-1122-3344-5566-778899aabbcc"
        companyId:
          type: string
          nullable: true
          description: Company identifier
          example: "tcrn:company:11111111-1111-1111-1111-111111111111"
        status:
          type: string
          description: Overall onboarding status
          enum:
            - NOT_STARTED
            - IN_PROGRESS
            - COMPLETED
            - STALLED
          example: "IN_PROGRESS"
        completionPercentage:
          type: integer
          format: int32
          description: Overall completion percentage (0-100)
          minimum: 0
          maximum: 100
          example: 66
        steps:
          $ref: '#/components/schemas/OnboardingSteps'
        timestamps:
          $ref: '#/components/schemas/OnboardingTimestamps'
        fullyOnboarded:
          type: boolean
          description: Whether all onboarding steps are completed
          example: false

    OnboardingSteps:
      type: object
      required:
        - profileComplete
        - documentsVerified
        - firstVehicleListed
      properties:
        profileComplete:
          type: boolean
          description: Whether the company profile has been fully completed
          example: true
        documentsVerified:
          type: boolean
          description: Whether company documents have been verified
          example: true
        firstVehicleListed:
          type: boolean
          description: Whether the first vehicle has been listed
          example: false

    OnboardingTimestamps:
      type: object
      properties:
        profileCompletedAt:
          type: string
          format: date-time
          nullable: true
          description: When the profile was completed (ISO 8601)
          example: "2024-01-10T10:00:00Z"
        documentsVerifiedAt:
          type: string
          format: date-time
          nullable: true
          description: When documents were verified (ISO 8601)
          example: "2024-01-12T14:00:00Z"
        firstVehicleListedAt:
          type: string
          format: date-time
          nullable: true
          description: When the first vehicle was listed (ISO 8601)
          example: null
        onboardingStartedAt:
          type: string
          format: date-time
          nullable: true
          description: When onboarding was started (ISO 8601)
          example: "2024-01-10T09:00:00Z"
        onboardingCompletedAt:
          type: string
          format: date-time
          nullable: true
          description: When onboarding was completed (ISO 8601)
          example: null

    CompleteStepResponse:
      type: object
      required:
        - onboarding
        - message
      properties:
        onboarding:
          $ref: '#/components/schemas/OnboardingStatusResponse'
        message:
          type: string
          description: Success message
          example: "Step completed successfully"

    # ==================== User Profile Schemas ====================
    UpdateProfileRequest:
      type: object
      required:
        - name
        - email
      properties:
        name:
          type: string
          maxLength: 100
          description: User's display name
          example: "Jan Kowalski"
        email:
          type: string
          format: email
          maxLength: 255
          description: User's email address
          example: "jan.kowalski@rentacar.pl"
        phone:
          type: string
          maxLength: 20
          nullable: true
          description: User's phone number
          example: "+48123456789"

    ProfileResponse:
      type: object
      properties:
        message:
          type: string
          description: Result message
          example: "Profile updated successfully"
        userId:
          type: string
          nullable: true
          description: User identifier
          example: "auth0|507f1f77bcf86cd799439011"
        name:
          type: string
          nullable: true
          description: User's display name
          example: "Jan Kowalski"
        email:
          type: string
          nullable: true
          description: User's email address
          example: "jan.kowalski@rentacar.pl"

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Firebase JWT token with COMPANY role custom claim

security:
  - bearerAuth: []
