          schema:
            type: string
            format: date-time
          example: "2024-01-01T00:00:00Z"
        - name: endDate
          in: query
          required: true
          description: End of analytics period (ISO 8601 date-time format)
          schema:
            type: string
            format: date-time
          example: "2024-01-31T23:59:59Z"
        - name: vehicleTypes
