  /support/tickets/{id}/status:
    patch:
      tags:
        - Support Tickets
      summary: Update ticket status
      description: |
        Updates the status of a support ticket.

        **Authentication required**: This endpoint requires a valid JWT bearer token with COMPANY role.

        The ticket must belong to the authenticated company.

        **Valid status transitions:**
        - open -> in_progress, waiting_customer, resolved, closed
        - in_progress -> waiting_customer, resolved, closed
        - waiting_customer -> in_progress, resolved, closed
        - resolved -> closed, in_progress
        - closed -> (no transitions allowed)
      operationId: updateTicketStatus
      parameters:
        - name: id
          in: path
          required: true
          description: The ticket identifier
          schema:
            type: string
          example: "tcrn:ticket:aabbccdd-1122-3344-5566-778899aabbcc"
        - name: status
          in: query
          required: true
          description: The new ticket status
          schema:
            type: string
            enum:
              - open
              - in_progress
              - waiting_customer
              - resolved
              - closed
          example: "resolved"
      responses:
        '200':
          description: Ticket status updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SupportTicket'
              example:
                id: "tcrn:ticket:aabbccdd-1122-3344-5566-778899aabbcc"
                companyId: "tcrn:company:11111111-1111-1111-1111-111111111111"
                createdById: "user-123"
                subject: "Unable to upload vehicle photos"
                description: "When trying to upload photos..."
                category: "technical"
                priority: "medium"
                status: "resolved"
                assignedTo: "support-agent-456"
                firstResponseAt: "2024-01-15T14:00:00Z"
                resolvedAt: "2024-01-16T09:00:00Z"
                slaResponseDue: "2024-01-15T20:00:00Z"
                slaResolutionDue: "2024-01-17T12:00:00Z"
                slaResponseBreached: false
                slaResolutionBreached: false
                createdAt: "2024-01-15T12:00:00Z"
                updatedAt: "2024-01-16T09:00:00Z"
                messageCount: 4

        '400':
          description: Bad request - invalid status transition
          content:
            application/json:
              schema:
                $ref: '../shared/schemas/common.yaml#/ErrorResponse'

        '401':
          description: Unauthorized - invalid or missing authentication
          content:
            application/json:
              schema:
                $ref: '../shared/schemas/common.yaml#/ErrorResponse'

        '404':
          description: Ticket not found
          content:
            application/json:
              schema:
                $ref: '../shared/schemas/common.yaml#/ErrorResponse'

        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '../shared/schemas/common.yaml#/ErrorResponse'

