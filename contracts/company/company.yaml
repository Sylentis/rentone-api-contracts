  # ==================== SMART IMPORT (AI-POWERED) ====================
  /vehicles/smart-import:
    post:
      tags:
        - Fleet Management
      summary: Upload file for AI-powered smart import
      description: |
        Upload a CSV or Excel file for AI-powered vehicle import.

        **Access Control:** Company Owner only.

        **Flow:**
        1. Upload file → Security validation (macros, injection)
        2. AI maps columns to vehicle fields
        3. Preview mapped vehicles with validation
        4. Edit individual vehicles if needed
        5. Confirm to import selected vehicles

        **Supported formats:** CSV, XLSX, XLS
        **Max file size:** Configurable (default 5MB)
        **Max rows:** 500 per file

        **Security features:**
        - Magic byte validation (file type verification)
        - CSV injection detection and sanitization
        - Excel macro detection and rejection
        - Rate limiting (2 uploads per minute per company)
      operationId: uploadSmartImport
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: CSV or Excel file to import. Max 5MB.
      responses:
        '202':
          description: File accepted for processing
          content:
            application/json:
              schema:
                $ref: '../shared/schemas/smart-import.yaml#/UploadSmartImportResponse'
              example:
                sessionId: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                status: "processing"
                message: "File uploaded. AI mapping in progress."
        '400':
          description: Bad request - invalid file
          content:
            application/json:
              schema:
                $ref: '../shared/schemas/common.yaml#/ErrorResponse'
              examples:
                invalidFormat:
                  summary: Invalid file format
                  value:
                    error: "Bad Request"
                    message: "Unsupported file format. Allowed: csv, xlsx, xls"
                    timestamp: "2024-12-15T12:00:00Z"
                emptyFile:
                  summary: Empty file
                  value:
                    error: "Bad Request"
                    message: "File is empty or contains no data rows"
                    timestamp: "2024-12-15T12:00:00Z"
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '../shared/schemas/common.yaml#/ErrorResponse'
        '403':
          description: Forbidden - user is not company owner
          content:
            application/json:
              schema:
                $ref: '../shared/schemas/common.yaml#/ErrorResponse'
              example:
                status: 403
                error: "Forbidden"
                errorCode: "NOT_COMPANY_OWNER"
                message: "Smart Import is only available to company owners"
                timestamp: "2024-12-15T12:00:00Z"
        '413':
          description: File too large
          content:
            application/json:
              schema:
                $ref: '../shared/schemas/common.yaml#/ErrorResponse'
              example:
                error: "Payload Too Large"
                message: "File size exceeds maximum allowed (5MB)"
                timestamp: "2024-12-15T12:00:00Z"
        '422':
          description: Security violation detected
          content:
            application/json:
              schema:
                $ref: '../shared/schemas/smart-import.yaml#/SmartImportSecurityError'
              examples:
                macroDetected:
                  summary: Malicious macro detected
                  value:
                    error: "Security Violation"
                    errorCode: "MALICIOUS_MACRO"
                    message: "File contains macros which are not allowed for security reasons"
                    timestamp: "2024-12-15T12:00:00Z"
                csvInjection:
                  summary: CSV injection detected
                  value:
                    error: "Security Violation"
                    errorCode: "CSV_INJECTION"
                    message: "File contains potentially malicious formula injection"
                    timestamp: "2024-12-15T12:00:00Z"
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '../shared/schemas/common.yaml#/ErrorResponse'
              example:
                error: "Too Many Requests"
                message: "Rate limit exceeded. Maximum 2 imports per minute."
                timestamp: "2024-12-15T12:00:00Z"
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '../shared/schemas/common.yaml#/ErrorResponse'

  /vehicles/smart-import/{sessionId}:
