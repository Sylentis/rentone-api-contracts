      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../shared/schemas/smart-import.yaml#/UpdateColumnMappingsRequest'
            example:
              mappings:
                - fileColumnIndex: 0
                  vehicleField: "make"
                - fileColumnIndex: 1
                  vehicleField: "model"
                - fileColumnIndex: 2
                  vehicleField: "year"
      responses:
        '200':
          description: Mappings updated, vehicles re-parsed
          content:
            application/json:
              schema:
                $ref: '../shared/schemas/smart-import.yaml#/UpdateColumnMappingsResponse'
