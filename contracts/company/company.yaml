  # ==================== VEHICLE QUALITY ====================
  /vehicles/{vehicleId}/submit:
    post:
      tags:
        - Vehicle Quality
      summary: Submit vehicle for quality review
      description: |
        Submits a vehicle for quality review.

        **Authentication required**: This endpoint requires a valid JWT bearer token with COMPANY role.

        The vehicle must be in DRAFT or REJECTED status and must pass validation before submission.
        The vehicle must belong to the authenticated company.
      operationId: submitVehicleForReview
      parameters:
        - name: vehicleId
          in: path
          required: true
          description: The vehicle identifier
          schema:
            type: string
          example: "tcrn:vehicle:3fa85f64-5717-4562-b3fc-2c963f66afa6"
      responses:
        '200':
          description: Vehicle submitted for review successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubmitVehicleForReviewResponse'
              example:
                qualityStatus:
                  vehicleId: "tcrn:vehicle:3fa85f64-5717-4562-b3fc-2c963f66afa6"
                  listingStatus: "PENDING_REVIEW"
                  statusDescription: "Vehicle is awaiting quality review"
                  submittedForReviewAt: "2024-01-15T10:00:00Z"
                  reviewedAt: null
                  reviewedBy: null
                  rejectionReason: null
                  photoQualityScore: 85
                  listingCompletenessScore: 92
                  overallQualityScore: 88
                  customerRating: null
                  customerReviewCount: 0
                  canSubmitForReview: false
                message: "Vehicle successfully submitted for quality review"

        '400':
          description: Bad request - vehicle cannot be submitted (validation errors or invalid status)
          content:
            application/json:
              schema:
                $ref: '../shared/schemas/common.yaml#/ErrorResponse'
              example:
                status: 400
                error: "Bad Request"
                errorCode: "VALIDATION_ERROR"
                message: "Vehicle cannot be submitted: photos: At least 3 photos are required"
                timestamp: "2024-01-15T12:00:00Z"

        '401':
          description: Unauthorized - invalid or missing authentication
          content:
            application/json:
              schema:
                $ref: '../shared/schemas/common.yaml#/ErrorResponse'

        '403':
          description: Forbidden - vehicle does not belong to the authenticated company
          content:
            application/json:
              schema:
                $ref: '../shared/schemas/common.yaml#/ErrorResponse'

        '404':
          description: Vehicle not found
          content:
            application/json:
              schema:
                $ref: '../shared/schemas/common.yaml#/ErrorResponse'

        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '../shared/schemas/common.yaml#/ErrorResponse'

