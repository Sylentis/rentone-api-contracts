openapi: 3.0.3
info:
  title: RNT-ALPH Company Management API
  description: |
    Company management API for rental companies.
    Allows rental companies to manage their fleet, view reservations, and accept/reject bookings.
  version: 1.0.0
  contact:
    name: RNT-ALPH Team

servers:
  - url: http://localhost:9847/api/v1/company
    description: Local development server
  - url: https://api.rnt-alph.com/v1/company
    description: Production server

tags:
  - name: Fleet Management
    description: Manage company's vehicle fleet
  - name: Reservations
    description: View and manage reservations
  - name: Company Profile
    description: Company profile and settings management
  - name: Company User
    description: User role and permissions within a company
  - name: Dashboard
    description: Company dashboard metrics and analytics
  - name: Analytics
    description: Company analytics summary and data export
  - name: Vehicle Quality
    description: Vehicle quality control and company quality metrics
  - name: Support Tickets
    description: Support ticket management for companies
  - name: Onboarding
    description: Company onboarding status and step completion
  - name: User Profile
    description: Company user profile management

paths:
  # ==================== COMPANY PROFILE ====================
  /profile:
    get:
      tags:
        - Company Profile
      summary: Get company profile
      description: |
        Returns the full profile of the authenticated company.
        Includes contact information, address, logo, and statistics.
      operationId: getCompanyProfile
      responses:
        '200':
          description: Successfully retrieved company profile
          content:
            application/json:
              schema:
                $ref: '../shared/schemas/company-profile.yaml#/CompanyProfile'
              example:
                id: "tcrn:company:11111111-1111-1111-1111-111111111111"
                name: "Rent-A-Car Poland"
                description: "Leading car rental company in Poland with over 20 years of experience"
                email: "contact@rentacar.pl"
                phone: "+48 22 123 45 67"
                websiteUrl: "https://www.rentacar.pl"
                logoUrl: "https://cdn.rnt-alph.com/logos/rentacar-poland.png"
                nip: "1234567890"
                regon: "123456789"
                address:
                  street: "ul. Marszałkowska 100"
                  city: "Warsaw"
                  postalCode: "00-001"
                  country: "Poland"
                rating: 45
                reviewCount: 127
                createdAt: "2020-01-15T10:30:00Z"
                updatedAt: "2024-11-15T14:20:00Z"

        '401':
          description: Unauthorized - invalid or missing authentication
          content:
            application/json:
              schema:
                $ref: '../shared/schemas/common.yaml#/ErrorResponse'

        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '../shared/schemas/common.yaml#/ErrorResponse'

    patch:
      tags:
        - Company Profile
      summary: Update company profile
      description: |
        Updates the company profile. Only provided fields will be updated.

        **Note:** Logo cannot be updated here - use `POST /profile/logo` instead.

        **Updatable fields:**
        - name, description, email, phone
        - websiteUrl, nip, regon
        - address (street, city, postalCode, country)
      operationId: updateCompanyProfile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../shared/schemas/company-profile.yaml#/UpdateCompanyProfileRequest'
            examples:
              updateBasicInfo:
                summary: Update basic info
                value:
                  name: "Rent-A-Car Poland - Premium"
                  description: "Premium car rental services across Poland"
                  phone: "+48 22 999 88 77"
              updateAddress:
                summary: Update address only
                value:
                  address:
                    street: "ul. Nowy Świat 50"
                    city: "Warsaw"
                    postalCode: "00-002"
                    country: "Poland"
              updateAll:
                summary: Full update
                value:
                  name: "Rent-A-Car Poland"
                  description: "Leading car rental company"
                  email: "info@rentacar.pl"
                  phone: "+48 22 123 45 67"
                  websiteUrl: "https://www.rentacar.pl"
                  nip: "1234567890"
                  regon: "123456789"
                  address:
                    street: "ul. Marszałkowska 100"
                    city: "Warsaw"
                    postalCode: "00-001"
                    country: "Poland"

      responses:
        '200':
          description: Profile updated successfully
          content:
            application/json:
              schema:
                $ref: '../shared/schemas/company-profile.yaml#/UpdateCompanyProfileResponse'

        '400':
          description: Bad request - validation error
          content:
            application/json:
              schema:
                $ref: '../shared/schemas/common.yaml#/ErrorResponse'
              examples:
                invalidEmail:
                  summary: Invalid email format
                  value:
                    error: "Bad Request"
                    message: "Invalid email format"
                    timestamp: "2024-11-15T12:00:00Z"
                invalidNip:
                  summary: Invalid NIP format
                  value:
                    error: "Bad Request"
                    message: "NIP must be exactly 10 digits"
                    timestamp: "2024-11-15T12:00:00Z"
                nameTooLong:
                  summary: Name too long
                  value:
                    error: "Bad Request"
                    message: "Name must not exceed 200 characters"
                    timestamp: "2024-11-15T12:00:00Z"

        '401':
          description: Unauthorized - invalid or missing authentication
          content:
            application/json:
              schema:
                $ref: '../shared/schemas/common.yaml#/ErrorResponse'

        '403':
          description: Forbidden - user is not a company owner
          content:
            application/json:
              schema:
                $ref: '../shared/schemas/common.yaml#/ErrorResponse'
              example:
                status: 403
                error: "Forbidden"
                errorCode: "NOT_COMPANY_OWNER"
                message: "Only company owners can edit the company profile"
                timestamp: "2024-11-15T12:00:00Z"

        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '../shared/schemas/common.yaml#/ErrorResponse'

  /profile/logo:
    post:
      tags:
        - Company Profile
      summary: Upload company logo
      description: |
        Upload or replace the company logo.

        **Supported formats:** JPEG, PNG, GIF, WebP

        **Requirements:**
        - Maximum file size: 5MB
        - Recommended dimensions: 200x200 to 1000x1000 pixels
        - Square images work best

        **Processing:**
        - Images are automatically resized and optimized
        - Previous logo is replaced
      operationId: uploadCompanyLogo
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: Logo image file (JPEG, PNG, GIF, WebP)

      responses:
        '200':
          description: Logo uploaded successfully
          content:
            application/json:
              schema:
                $ref: '../shared/schemas/company-profile.yaml#/UploadLogoResponse'
              example:
                logoUrl: "https://cdn.rnt-alph.com/logos/rentacar-poland-abc123.png"
                message: "Logo uploaded successfully"

        '400':
          description: Bad request - invalid file
          content:
            application/json:
              schema:
                $ref: '../shared/schemas/common.yaml#/ErrorResponse'
              examples:
                invalidFormat:
                  summary: Invalid file format
                  value:
                    error: "Bad Request"
                    message: "Unsupported file format. Allowed: jpeg, png, gif, webp"
                    timestamp: "2024-11-15T12:00:00Z"
                noFile:
                  summary: No file provided
                  value:
                    error: "Bad Request"
                    message: "No file provided"
                    timestamp: "2024-11-15T12:00:00Z"

        '401':
          description: Unauthorized - invalid or missing authentication
          content:
            application/json:
              schema:
                $ref: '../shared/schemas/common.yaml#/ErrorResponse'

        '413':
          description: File too large
          content:
            application/json:
              schema:
                $ref: '../shared/schemas/common.yaml#/ErrorResponse'
              example:
                error: "Payload Too Large"
                message: "File size exceeds maximum allowed (5MB)"
                timestamp: "2024-11-15T12:00:00Z"

        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '../shared/schemas/common.yaml#/ErrorResponse'

    delete:
      tags:
        - Company Profile
      summary: Delete company logo
      description: |
        Removes the company logo. The company will have no logo until a new one is uploaded.
      operationId: deleteCompanyLogo
      responses:
        '200':
          description: Logo deleted successfully
          content:
            application/json:
              schema:
                $ref: '../shared/schemas/company-profile.yaml#/DeleteLogoResponse'
              example:
                message: "Logo deleted successfully"

        '401':
          description: Unauthorized - invalid or missing authentication
          content:
            application/json:
              schema:
                $ref: '../shared/schemas/common.yaml#/ErrorResponse'

        '404':
          description: No logo to delete
          content:
            application/json:
              schema:
                $ref: '../shared/schemas/common.yaml#/ErrorResponse'
              example:
                error: "Not Found"
                message: "Company has no logo to delete"
                timestamp: "2024-11-15T12:00:00Z"

        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '../shared/schemas/common.yaml#/ErrorResponse'

  # ==================== COMPANY USER ====================
  /user/role:
    get:
      tags:
        - Company User
      summary: Get current user's role in company
      description: |
        Returns the authenticated user's role and permissions within their company.

        **Roles:**
        - **OWNER**: Full access - can edit profile, manage fleet, and manage reservations
        - **MANAGER**: Can manage fleet and reservations, but cannot edit company profile
        - **VIEWER**: Read-only access - can view data but cannot make changes

        Use this endpoint to determine which UI features to enable for the current user.
      operationId: getUserRole
      responses:
        '200':
          description: Successfully retrieved user role and permissions
          content:
            application/json:
              schema:
                $ref: '../shared/schemas/company-user.yaml#/GetUserRoleResponse'
              examples:
                owner:
                  summary: Owner user
                  value:
                    role: "OWNER"
                    canEditProfile: true
                    canManageFleet: true
                    canManageReservations: true
                manager:
                  summary: Manager user
                  value:
                    role: "MANAGER"
                    canEditProfile: false
                    canManageFleet: true
                    canManageReservations: true
                viewer:
                  summary: Viewer user
                  value:
                    role: "VIEWER"
                    canEditProfile: false
                    canManageFleet: false
                    canManageReservations: false

        '401':
          description: Unauthorized - invalid or missing authentication
          content:
            application/json:
              schema:
                $ref: '../shared/schemas/common.yaml#/ErrorResponse'
              example:
                status: 401
                error: "Unauthorized"
                errorCode: "UNAUTHORIZED"
                message: "Invalid or missing authentication token"
                timestamp: "2024-11-15T12:00:00Z"

        '403':
          description: Forbidden - user is not associated with any company
          content:
            application/json:
              schema:
                $ref: '../shared/schemas/common.yaml#/ErrorResponse'
              example:
                status: 403
                error: "Forbidden"
                errorCode: "NOT_COMPANY_MEMBER"
                message: "User is not associated with any company"
                timestamp: "2024-11-15T12:00:00Z"

        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '../shared/schemas/common.yaml#/ErrorResponse'

  # ==================== FLEET MANAGEMENT ====================
  /vehicles:
    get:
      tags:
        - Fleet Management
      summary: Get all company vehicles
      description: |
        Returns all vehicles belonging to the authenticated company.
        Companies can filter by vehicle type and availability status.
      operationId: getCompanyVehicles
      parameters:
        # Fuzzy search
        - $ref: '../shared/parameters/common.yaml#/SearchParam'
        # Vehicle filters
        - $ref: '../shared/parameters/common.yaml#/VehicleTypeParam'
        - $ref: '../shared/parameters/common.yaml#/TransmissionParam'
        - $ref: '../shared/parameters/common.yaml#/FuelTypeParam'
        - name: available
          in: query
          required: false
          description: Filter by availability status
          schema:
            type: boolean
          example: true
        # Pagination
        - $ref: '../shared/parameters/common.yaml#/PageParam'
        - $ref: '../shared/parameters/common.yaml#/SizeParam'

      responses:
        '200':
          description: Successfully retrieved company vehicles
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompanyVehiclesResponse'
              example:
                vehicles:
                  - id: "tcrn:vehicle:3fa85f64-5717-4562-b3fc-2c963f66afa6"
                    make: "Toyota"
                    model: "RAV4"
                    year: 2023
                    vehicleType: "suv"
                    transmission: "automatic"
                    fuelType: "hybrid"
                    seats: 5
                    pricePerDay: 25000
                    currency: "PLN"
                    mainImage: "https://cdn.example.com/vehicles/rav4.jpg"
                    available: true
                  - id: "tcrn:vehicle:4fa85f64-5717-4562-b3fc-2c963f66afa7"
                    make: "BMW"
                    model: "X5"
                    year: 2024
                    vehicleType: "suv"
                    transmission: "automatic"
                    fuelType: "diesel"
                    seats: 7
                    pricePerDay: 45000
                    currency: "PLN"
                    mainImage: "https://cdn.example.com/vehicles/bmw-x5.jpg"
                    available: true
                pagination:
                  currentPage: 0
                  pageSize: 20
                  totalElements: 45
                  totalPages: 3

        '401':
          description: Unauthorized - invalid or missing authentication
          content:
            application/json:
              schema:
                $ref: '../shared/schemas/common.yaml#/ErrorResponse'
              example:
                error: "Unauthorized"
                message: "Invalid or missing authentication token"
                timestamp: "2024-11-15T12:00:00Z"

        '400':
          description: Bad request - invalid parameters
          content:
            application/json:
              schema:
                $ref: '../shared/schemas/common.yaml#/ErrorResponse'

        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '../shared/schemas/common.yaml#/ErrorResponse'

    post:
      tags:
        - Fleet Management
      summary: Add a new vehicle
      description: |
        Creates a new vehicle for the authenticated company.
      operationId: createVehicle
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../shared/schemas/vehicle.yaml#/CreateVehicleRequest'
            example:
              make: "Toyota"
              model: "RAV4"
              year: 2023
              vehicleType: "suv"
              transmission: "automatic"
              fuelType: "hybrid"
              seats: 5
              pricePerDay: 25000
              currency: "PLN"
              mainImage: "https://cdn.example.com/vehicles/rav4.jpg"
              available: true

      responses:
        '201':
          description: Vehicle created successfully
          content:
            application/json:
              schema:
                $ref: '../shared/schemas/vehicle.yaml#/CreateVehicleResponse'
              example:
                vehicle:
                  id: "tcrn:vehicle:8fa85f64-5717-4562-b3fc-2c963f66afab"
                  make: "Toyota"
                  model: "RAV4"
                  year: 2023
                  vehicleType: "suv"
                  transmission: "automatic"
                  fuelType: "hybrid"
                  seats: 5
                  pricePerDay: 25000
                  currency: "PLN"
                  mainImage: "https://cdn.example.com/vehicles/rav4.jpg"
                  available: true
                message: "Vehicle created successfully"

        '400':
          description: Bad request - invalid data
          content:
            application/json:
              schema:
                $ref: '../shared/schemas/common.yaml#/ErrorResponse'
              example:
                error: "Bad Request"
                message: "Validation failed: year must be between 1900 and 2100"
                timestamp: "2024-11-15T12:00:00Z"

        '401':
          description: Unauthorized - invalid or missing authentication
          content:
            application/json:
              schema:
                $ref: '../shared/schemas/common.yaml#/ErrorResponse'

        '404':
          description: Vehicle not found
          content:
            application/json:
              schema:
                $ref: '../shared/schemas/common.yaml#/ErrorResponse'
              example:
                error: "Not Found"
                message: "Vehicle not found"
                timestamp: "2024-11-15T12:00:00Z"

        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '../shared/schemas/common.yaml#/ErrorResponse'

  /vehicles/{vehicleId}:
    get:
      tags:
        - Fleet Management
      summary: Get vehicle details
      description: |
        Returns detailed information about a specific vehicle.
        Only accessible for vehicles belonging to the authenticated company.
      operationId: getVehicle
      parameters:
        - name: vehicleId
          in: path
          required: true
          description: Unique identifier of the vehicle (prefixed format)
          schema:
            $ref: '../shared/schemas/common.yaml#/VehicleId'

      responses:
        '200':
          description: Vehicle details retrieved successfully
          content:
            application/json:
              schema:
                $ref: '../shared/schemas/vehicle.yaml#/VehicleBase'
              example:
                id: "tcrn:vehicle:3fa85f64-5717-4562-b3fc-2c963f66afa6"
                make: "Toyota"
                model: "RAV4"
                year: 2023
                vehicleType: "suv"
                transmission: "automatic"
                fuelType: "hybrid"
                seats: 5
                pricePerDay: 25000
                currency: "PLN"
                description: "Spacious SUV perfect for family trips"
                features: ["GPS", "Bluetooth", "Backup Camera"]
                mainImage: "https://cdn.example.com/vehicles/rav4.jpg"
                images:
                  - url: "https://cdn.example.com/vehicles/rav4.jpg"
                    index: 0
                  - url: "https://cdn.example.com/vehicles/rav4-interior.jpg"
                    index: 1
                available: true

        '401':
          description: Unauthorized - invalid or missing authentication
          content:
            application/json:
              schema:
                $ref: '../shared/schemas/common.yaml#/ErrorResponse'

        '403':
          description: Forbidden - vehicle does not belong to the authenticated company
          content:
            application/json:
              schema:
                $ref: '../shared/schemas/common.yaml#/ErrorResponse'
              example:
                error: "Forbidden"
                message: "Vehicle does not belong to your company"
                timestamp: "2024-11-15T12:00:00Z"

        '404':
          description: Vehicle not found
          content:
            application/json:
              schema:
                $ref: '../shared/schemas/common.yaml#/ErrorResponse'
              example:
                error: "Not Found"
                message: "Vehicle not found"
                timestamp: "2024-11-15T12:00:00Z"

        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '../shared/schemas/common.yaml#/ErrorResponse'

    patch:
      tags:
        - Fleet Management
      summary: Update vehicle
      description: |
        Updates an existing vehicle. Only provided fields will be updated.
        The vehicle must belong to the authenticated company.
      operationId: updateVehicle
      parameters:
        - name: vehicleId
          in: path
          required: true
          description: Unique identifier of the vehicle (prefixed format)
          schema:
            $ref: '../shared/schemas/common.yaml#/VehicleId'

      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../shared/schemas/vehicle.yaml#/UpdateVehicleRequest'
            examples:
              updatePrice:
                summary: Update price only
                value:
                  pricePerDay: 27500
              updateAvailability:
                summary: Update availability
                value:
                  available: false
              updateMultiple:
                summary: Update multiple fields
                value:
                  pricePerDay: 30000
                  description: "Recently serviced, excellent condition"
                  features: ["GPS", "Bluetooth", "Backup Camera", "Heated Seats"]
                  available: true

      responses:
        '200':
          description: Vehicle updated successfully
          content:
            application/json:
              schema:
                $ref: '../shared/schemas/vehicle.yaml#/UpdateVehicleResponse'
              example:
                vehicle:
                  id: "tcrn:vehicle:3fa85f64-5717-4562-b3fc-2c963f66afa6"
                  make: "Toyota"
                  model: "RAV4"
                  year: 2023
                  vehicleType: "suv"
                  transmission: "automatic"
                  fuelType: "hybrid"
                  seats: 5
                  pricePerDay: 30000
                  currency: "PLN"
                  description: "Recently serviced, excellent condition"
                  features: ["GPS", "Bluetooth", "Backup Camera", "Heated Seats"]
                  mainImage: "https://cdn.example.com/vehicles/rav4.jpg"
                  available: true
                message: "Vehicle updated successfully"

        '400':
          description: Bad request - validation error
          content:
            application/json:
              schema:
                $ref: '../shared/schemas/common.yaml#/ErrorResponse'
              example:
                error: "Bad Request"
                message: "Validation failed: pricePerDay must be positive"
                timestamp: "2024-11-15T12:00:00Z"

        '401':
          description: Unauthorized - invalid or missing authentication
          content:
            application/json:
              schema:
                $ref: '../shared/schemas/common.yaml#/ErrorResponse'

        '403':
          description: Forbidden - vehicle does not belong to the authenticated company
          content:
            application/json:
              schema:
                $ref: '../shared/schemas/common.yaml#/ErrorResponse'
              example:
                error: "Forbidden"
                message: "Vehicle does not belong to your company"
                timestamp: "2024-11-15T12:00:00Z"

        '404':
          description: Vehicle not found
          content:
            application/json:
              schema:
                $ref: '../shared/schemas/common.yaml#/ErrorResponse'
              example:
                error: "Not Found"
                message: "Vehicle not found"
                timestamp: "2024-11-15T12:00:00Z"

        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '../shared/schemas/common.yaml#/ErrorResponse'

    delete:
      tags:
        - Fleet Management
      summary: Delete vehicle
      description: |
        Permanently deletes a vehicle from the company's fleet.
        This action cannot be undone.

        **Note:** Vehicles with active or pending reservations cannot be deleted.
      operationId: deleteVehicle
      parameters:
        - name: vehicleId
          in: path
          required: true
          description: Unique identifier of the vehicle (prefixed format)
          schema:
            $ref: '../shared/schemas/common.yaml#/VehicleId'

      responses:
        '204':
          description: Vehicle deleted successfully

        '401':
          description: Unauthorized - invalid or missing authentication
          content:
            application/json:
              schema:
                $ref: '../shared/schemas/common.yaml#/ErrorResponse'

        '403':
          description: Forbidden - vehicle does not belong to the authenticated company
          content:
            application/json:
              schema:
                $ref: '../shared/schemas/common.yaml#/ErrorResponse'
              example:
                error: "Forbidden"
                message: "Vehicle does not belong to your company"
                timestamp: "2024-11-15T12:00:00Z"

        '404':
          description: Vehicle not found
          content:
            application/json:
              schema:
                $ref: '../shared/schemas/common.yaml#/ErrorResponse'
              example:
                error: "Not Found"
                message: "Vehicle not found"
                timestamp: "2024-11-15T12:00:00Z"

        '409':
          description: Conflict - vehicle has active reservations
          content:
            application/json:
              schema:
                $ref: '../shared/schemas/common.yaml#/ErrorResponse'
              example:
                error: "Conflict"
                message: "Cannot delete vehicle with active or pending reservations"
                timestamp: "2024-11-15T12:00:00Z"

        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '../shared/schemas/common.yaml#/ErrorResponse'

  /vehicles/import:
    post:
      tags:
        - Fleet Management
      summary: Import vehicles from file
      description: |
        Import multiple vehicles from an Excel (XLSX, XLS) or CSV file.

        **File format requirements:**
        - First row must be a header row with column names
        - Required columns: make, model, year, vehicleType, transmission, fuelType, seats, pricePerDay
        - Optional columns: currency, mainImage, available

        **Validation behavior:**
        - By default (strict=true), the entire file is validated first
        - If any validation errors are found, no vehicles are imported
        - Set strict=false to import valid rows and skip invalid ones

        **Supported formats:**
        - XLSX (recommended)
        - XLS (legacy Excel)
        - CSV (comma-separated)
      operationId: importVehicles
      parameters:
        - name: strict
          in: query
          required: false
          description: |
            Validation mode:
            - true (default): Validate all rows first, import only if all valid
            - false: Import valid rows, skip invalid ones
          schema:
            type: boolean
            default: true
          example: true

      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: Excel or CSV file to import

      responses:
        '200':
          description: Import completed (check success field for result)
          content:
            application/json:
              schema:
                $ref: '../shared/schemas/vehicle.yaml#/ImportVehiclesResponse'
              examples:
                success:
                  summary: Successful import
                  value:
                    success: true
                    totalRows: 50
                    validRows: 50
                    invalidRows: 0
                    importedCount: 50
                    message: "Import completed successfully. 50 vehicles imported."
                validationFailed:
                  summary: Validation failed (strict mode)
                  value:
                    success: false
                    totalRows: 50
                    validRows: 48
                    invalidRows: 2
                    errors:
