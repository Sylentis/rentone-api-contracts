  # ==================== DASHBOARD ====================
  /dashboard/metrics:
    get:
      tags:
        - Dashboard
      summary: Get company dashboard metrics
      description: |
        Returns lightweight dashboard metrics for the authenticated company.

        **Metrics included:**
        - Vehicle statistics (total, available)
        - Reservation statistics (active, pending, today's pickups)
        - Revenue metrics (total for period)
        - Recent reservations (last 5)

        **Period filtering:**
        - `today`: Only today's data
        - `7days`: Last 7 days
        - `30days`: Last 30 days (default)
        - `thisMonth`: Current calendar month
        - `allTime`: All historical data
      operationId: getDashboardMetrics
      parameters:
        - name: period
          in: query
          required: false
          description: "Time period for revenue filtering (default: 30days)"
          schema:
            type: string
            enum: [today, 7days, 30days, thisMonth, allTime]
            default: 30days
          example: 30days

