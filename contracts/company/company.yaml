        **Caching**: Responses are cached for 5 minutes to reduce database load.

        **Metrics included:**
        - Revenue metrics with tier breakdown (DAILY/WEEKLY/MONTHLY)
        - Vehicle performance and utilization rates
        - Monthly statistics and trends
        - Top 10 performing vehicles
        - Time-series data for charts (revenue, reservations)
        - Vehicle type distribution (pie chart data)
        - Availability heatmap
      operationId: getAnalyticsSummary
      parameters:
        - name: startDate
          in: query
          required: true
